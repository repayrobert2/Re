<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Link Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .panel {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .quick-presets {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        
        .preset-btn {
            padding: 8px 16px;
            background: #f0f0f0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .preset-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .output-section {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 2px solid #f0f0f0;
        }
        
        .output-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .output-box {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 16px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            word-break: break-all;
            margin-bottom: 15px;
        }
        
        .output-actions {
            display: flex;
            gap: 10px;
        }
        
        .preview-section {
            margin-top: 25px;
        }
        
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .preview-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        
        .iframe-container {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            overflow: hidden;
            height: 500px;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .hidden {
            display: none;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Payment Link Generator</h1>
            <p>Generate custom payment links instantly</p>
        </div>
        
        <div class="panel">
            <div class="form-grid">
                <div class="form-group">
                    <label>UPI ID</label>
                    <input type="text" id="upiInput" placeholder="example@upi">
                    <div class="quick-presets">
                        <button class="preset-btn" onclick="setUpi('paytm')">Paytm</button>
                        <button class="preset-btn" onclick="setUpi('gpay')">GPay</button>
                        <button class="preset-btn" onclick="setUpi('phonepe')">PhonePe</button>
                        <button class="preset-btn" onclick="setUpi('amazon')">Amazon Pay</button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Amount (₹)</label>
                    <input type="number" id="amountInput" placeholder="100" min="1" step="0.01">
                    <div class="quick-presets">
                        <button class="preset-btn" onclick="setAmount(100)">₹100</button>
                        <button class="preset-btn" onclick="setAmount(500)">₹500</button>
                        <button class="preset-btn" onclick="setAmount(1000)">₹1K</button>
                        <button class="preset-btn" onclick="setAmount(5000)">₹5K</button>
                        <button class="preset-btn" onclick="setAmount(10000)">₹10K</button>
                        <button class="preset-btn" onclick="setAmount(50000)">₹50K</button>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label>Merchant Name (Optional)</label>
                <input type="text" id="nameInput" placeholder="Merchant Name" value="SecurePay">
            </div>
            
            <div class="actions">
                <button class="btn btn-primary" onclick="generate()">Generate Link</button>
                <button class="btn btn-secondary" onclick="preview()">Preview</button>
                <button class="btn btn-secondary" onclick="openLink()">Open</button>
                <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
            </div>
            
            <div class="output-section" id="outputSection">
                <div class="output-label">Generated URL:</div>
                <div class="output-box" id="urlOutput">Click "Generate Link" to create payment URL...</div>
                
                <div class="output-actions">
                    <button class="btn btn-secondary" onclick="copyUrl()">Copy URL</button>
                    <button class="btn btn-secondary" onclick="copyUpi()">Copy UPI Link</button>
                </div>
                
                <div style="margin-top: 20px;">
                    <div class="output-label">UPI Deep Link:</div>
                    <div class="output-box" id="upiOutput">rajatmehta.smc.245@ybl</div>
                </div>
            </div>
            
            <div class="preview-section hidden" id="previewSection">
                <div class="preview-header">
                    <div class="preview-title">Live Preview</div>
                    <button class="btn btn-secondary" onclick="closePreview()">Close Preview</button>
                </div>
                <div class="iframe-container">
                    <iframe id="previewFrame" src=""></iframe>
                </div>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        const upiTemplates = {
            'paytm': 'paytm.s12rb9h@pty',
            'gpay': 'googlepay@okaxis',
            'phonepe': 'phonepe@ybl',
            'amazon': 'amazonpay@apl'
        };
        
        function setUpi(type) {
            const input = document.getElementById('upiInput');
            if (upiTemplates[type]) {
                input.value = upiTemplates[type];
            } else {
                input.focus();
            }
        }
        
        function setAmount(amt) {
            document.getElementById('amountInput').value = amt;
        }
        
        function generate() {
            const upi = document.getElementById('upiInput').value.trim();
            const amount = document.getElementById('amountInput').value || '100';
            const name = encodeURIComponent(document.getElementById('nameInput').value || 'Merchant');
            
            if (!upi) {
                showToast('Please enter a UPI ID');
                document.getElementById('upiInput').focus();
                return null;
            }
            
            const baseUrl = window.location.href.replace('generator.html', 'index.html');
            const url = `${baseUrl}?name=${name}&amount=${amount}&upi=${encodeURIComponent(upi)}`;
            
            document.getElementById('urlOutput').textContent = url;
            
            const upiLink = `upi://pay?pa=${encodeURIComponent(upi)}&pn=${name}&am=${amount}&cu=INR`;
            document.getElementById('upiOutput').textContent = upiLink;
            
            document.getElementById('outputSection').style.display = 'block';
            
            showToast('Link generated successfully!');
            
            return url;
        }
        
        function preview() {
            const url = generate();
            if (url) {
                document.getElementById('previewSection').classList.remove('hidden');
                document.getElementById('previewFrame').src = url;
            }
        }
        
        function openLink() {
            const url = document.getElementById('urlOutput').textContent;
            if (url && !url.includes('Click')) {
                window.open(url, '_blank');
            } else {
                showToast('Generate a link first');
            }
        }
        
        function closePreview() {
            document.getElementById('previewSection').classList.add('hidden');
            document.getElementById('previewFrame').src = '';
        }
        
        function copyUrl() {
            const url = document.getElementById('urlOutput').textContent;
            if (url && !url.includes('Click')) {
                navigator.clipboard.writeText(url).then(() => showToast('URL copied!'));
            }
        }
        
        function copyUpi() {
            const upiLink = document.getElementById('upiOutput').textContent;
            if (upiLink && !upiLink.includes('appear')) {
                navigator.clipboard.writeText(upiLink).then(() => showToast('UPI link copied!'));
            }
        }
        
        function clearAll() {
            document.getElementById('upiInput').value = '';
            document.getElementById('amountInput').value = '';
            document.getElementById('nameInput').value = 'SecurePay';
            document.getElementById('urlOutput').textContent = 'Click "Generate Link" to create payment URL...';
            document.getElementById('upiOutput').textContent = 'UPI link will appear here...';
            closePreview();
            showToast('Cleared');
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // Enter key to generate
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generate();
            }
        });
    </script>
</body>
</html>
