<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Link Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }
        
        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }
        
        .file-input-label {
            display: block;
            padding: 20px;
            background: #f8f9fa;
            border: 2px dashed #ddd;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            color: #666;
        }
        
        .file-input-label:hover {
            border-color: #667eea;
            background: #f0f2ff;
        }
        
        .logo-preview {
            width: 100%;
            height: 120px;
            border: 2px dashed #ddd;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 15px;
            overflow: hidden;
            background: #f8f9fa;
        }
        
        .logo-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .logo-preview-placeholder {
            color: #999;
            font-size: 14px;
        }
        
        .payment-method-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            border-color: #667eea;
            background: #f0f2ff;
            color: #667eea;
        }
        
        .upi-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .upi-note {
            font-size: 12px;
            color: #888;
            margin-top: 8px;
        }
        
        .generate-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 25px;
            transition: transform 0.2s;
        }
        
        .generate-btn:hover {
            transform: translateY(-2px);
        }
        
        .generate-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .result-section {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            display: none;
        }
        
        .result-section.show {
            display: block;
        }
        
        .result-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }
        
        .link-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .link-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
        }
        
        .copy-btn {
            padding: 12px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .copy-btn:hover {
            background: #218838;
        }
        
        .preview-section {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            text-align: center;
        }
        
        .preview-logo {
            max-width: 80px;
            max-height: 80px;
            margin-bottom: 10px;
        }
        
        .preview-name {
            font-size: 16px;
            color: #333;
            font-weight: 600;
        }
        
        .preview-upi {
            font-size: 14px;
            color: #667eea;
            margin-top: 5px;
            font-weight: 500;
        }
        
        .open-link-btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Payment Link Generator</h1>
        
        <div class="form-group">
            <label>Payment Amount (₹)</label>
            <input type="number" id="amount" placeholder="Enter amount" value="20000">
        </div>
        
        <div class="form-group">
            <label>Upload Logo</label>
            <div class="file-input-wrapper">
                <input type="file" id="logoInput" accept="image/*">
                <label for="logoInput" class="file-input-label">
                    📁 Click to upload logo
                </label>
            </div>
            <div class="logo-preview" id="logoPreview">
                <span class="logo-preview-placeholder">Logo preview</span>
            </div>
        </div>
        
        <div class="form-group">
            <label>Logo Name / Company Name</label>
            <input type="text" id="logoName" placeholder="Enter logo/company name">
        </div>
        
        <div class="form-group">
            <label>Payment Description</label>
            <input type="text" id="description" placeholder="e.g., Loan Payment" value="Secure payment">
        </div>
        
        <div class="upi-section">
            <label>UPI ID (Optional)</label>
            <input type="text" id="upiId" placeholder="example@upi or 9876543210@paytm">
            <p class="upi-note">Enter your UPI ID to receive payments directly. Customers can pay via Google Pay, PhonePe, Paytm, etc.</p>
        </div>
        
        <button class="generate-btn" id="generateBtn" onclick="generateLink()">Generate Payment Link</button>
        
        <div class="result-section" id="resultSection">
            <div class="result-label">Your Payment Link:</div>
            <div class="link-box">
                <input type="text" class="link-input" id="generatedLink" readonly>
                <button class="copy-btn" onclick="copyLink()">Copy</button>
            </div>
            
            <div class="preview-section">
                <div class="result-label">Link Preview:</div>
                <img id="previewLogo" class="preview-logo" src="" alt="Logo">
                <div class="preview-name" id="previewName"></div>
                <div class="preview-upi" id="previewUpi"></div>
            </div>
            
            <button class="open-link-btn" onclick="openPaymentLink()">Open Payment Page</button>
        </div>
    </div>
    
    <script>
        const logoInput = document.getElementById('logoInput');
        const logoPreview = document.getElementById('logoPreview');
        const generateBtn = document.getElementById('generateBtn');
        const resultSection = document.getElementById('resultSection');
        const generatedLink = document.getElementById('generatedLink');
        const previewLogo = document.getElementById('previewLogo');
        const previewName = document.getElementById('previewName');
        const previewUpi = document.getElementById('previewUpi');
        
        let logoBase64 = '';
        let generatedPaymentLink = '';
        
        logoInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    logoBase64 = e.target.result;
                    logoPreview.innerHTML = `<img src="${logoBase64}" alt="Preview">`;
                };
                reader.readAsDataURL(file);
            }
        });
        
        function generateLink() {
            const amount = document.getElementById('amount').value;
            const logoName = document.getElementById('logoName').value;
            const description = document.getElementById('description').value;
            const upiId = document.getElementById('upiId').value.trim();
            
            if (!amount || !logoName) {
                alert('Please fill in all required fields (Amount and Logo Name)');
                return;
            }
            
            // Store data in localStorage for the payment page to access
            const paymentData = {
                amount: amount,
                logoName: logoName,
                description: description,
                logo: logoBase64 || '',
                upiId: upiId,
                timestamp: Date.now()
            };
            
            // Generate unique link ID
            const linkId = 'pay_' + Date.now();
            localStorage.setItem(linkId, JSON.stringify(paymentData));
            
            // Create payment link
            const baseUrl = window.location.origin + window.location.pathname.replace('generator.html', 'pay.html');
            generatedPaymentLink = `${baseUrl}?id=${linkId}`;
            
            generatedLink.value = generatedPaymentLink;
            
            // Show preview
            if (logoBase64) {
                previewLogo.src = logoBase64;
                previewLogo.style.display = 'block';
            } else {
                previewLogo.style.display = 'none';
            }
            previewName.textContent = logoName;
            
            if (upiId) {
                previewUpi.textContent = 'UPI: ' + upiId;
            } else {
                previewUpi.textContent = '';
            }
            
            resultSection.classList.add('show');
        }
        
        function copyLink() {
            generatedLink.select();
            document.execCommand('copy');
            alert('Link copied to clipboard!');
        }
        
        function openPaymentLink() {
            window.open(generatedPaymentLink, '_blank');
        }
    </script>
</body>
</html>
