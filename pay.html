<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .lock-icon {
            text-align: center;
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        .secure-text {
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 30px;
        }
        
        .logo-section {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 25px;
        }
        
        .uploaded-logo {
            max-width: 100px;
            max-height: 100px;
            object-fit: contain;
            margin-bottom: 10px;
            border-radius: 8px;
        }
        
        .logo-name {
            font-size: 18px;
            color: #333;
            font-weight: 600;
        }
        
        .no-logo {
            color: #999;
            font-size: 14px;
            padding: 20px;
        }
        
        .amount-box {
            text-align: center;
            padding: 20px;
            background: #fff5eb;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 2px solid #ffb347;
        }
        
        .amount-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }
        
        .amount-value {
            font-size: 32px;
            font-weight: 700;
            color: #333;
        }
        
        .description {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .timer-box {
            background: #fff3cd;
            border: 1px solid #ffc107;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .timer-label {
            font-size: 12px;
            color: #856404;
            margin-bottom: 5px;
        }
        
        .timer-value {
            font-size: 18px;
            font-weight: 600;
            color: #dc3545;
        }
        
        .upi-section {
            background: linear-gradient(135deg, #667eea15, #764ba215);
            border-radius: 12px;
            padding: 25px 20px;
            margin-bottom: 25px;
            text-align: center;
            border: 2px solid #667eea30;
        }
        
        .upi-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }
        
        .upi-id-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .upi-id {
            flex: 1;
            font-size: 16px;
            font-weight: 600;
            color: #667eea;
            word-break: break-all;
            text-align: left;
        }
        
        .copy-upi-btn {
            padding: 8px 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
        }
        
        .upi-pay-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .upi-pay-btn:hover {
            opacity: 0.9;
        }
        
        /* App Selection Modal */
        .app-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .app-modal.show {
            display: flex;
        }
        
        .app-modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 350px;
            text-align: center;
        }
        
        .app-modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
        }
        
        .app-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .app-item {
            background: #f8f9fa;
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .app-item:hover {
            border-color: #667eea;
            background: #f0f2ff;
        }
        
        .app-icon-img {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            margin-bottom: 8px;
            object-fit: contain;
        }
        
        .app-name {
            font-size: 12px;
            font-weight: 500;
            color: #333;
        }
        
        .close-modal {
            padding: 12px 30px;
            background: #ddd;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        /* UTR Form */
        .utr-section {
            background: #e8f5e9;
            border: 2px solid #4caf50;
            border-radius: 12px;
            padding: 25px 20px;
            margin-top: 20px;
            text-align: center;
        }
        
        .utr-title {
            font-size: 18px;
            font-weight: 600;
            color: #2e7d32;
            margin-bottom: 10px;
        }
        
        .utr-note {
            font-size: 13px;
            color: #666;
            margin-bottom: 15px;
        }
        
        .utr-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #4caf50;
            border-radius: 10px;
            font-size: 18px;
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }
        
        .utr-input:focus {
            outline: none;
            border-color: #2e7d32;
        }
        
        .utr-submit-btn {
            width: 100%;
            padding: 15px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .utr-submit-btn:hover {
            background: #45a049;
        }
        
        .success-message {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .success-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }
        
        .error-message {
            text-align: center;
            padding: 30px;
            color: #666;
        }
        
        .error-message h2 {
            color: #dc3545;
            margin-bottom: 10px;
        }
        
        .expired-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container" id="paymentContainer">
        <div class="lock-icon">🔒</div>
        <h1 class="secure-text">Secure payment</h1>
        
        <div class="logo-section" id="logoSection">
            <div class="no-logo">No logo uploaded</div>
        </div>
        
        <div class="amount-box">
            <div class="amount-label">Amount to Pay</div>
            <div class="amount-value" id="amountValue">₹ 0</div>
        </div>
        
        <div class="description" id="paymentDescription">Complete your secure payment</div>
        
        <div class="timer-box" id="timerBox">
            <div class="timer-label">⏱️ Link expires in:</div>
            <div class="timer-value" id="timerValue">05:00</div>
        </div>
        
        <div class="upi-section" id="upiSection">
            <div class="upi-label">Pay via UPI</div>
            
            <div class="upi-id-box">
                <div class="upi-id" id="manualUpiId">-</div>
                <button class="copy-upi-btn" id="copyBtn" onclick="copyUpiId()">Copy</button>
            </div>
            
            <button class="upi-pay-btn" id="payBtn" onclick="showAppSelector()">Pay via UPI App</button>
        </div>
        
        <!-- UTR Submission Section (Hidden initially) -->
        <div class="utr-section" id="utrSection" style="display: none;">
            <div class="utr-title">✅ Payment Initiated</div>
            <div class="utr-note">Please complete the payment in your UPI app, then enter the UTR/Reference number below:</div>
            <input type="text" class="utr-input" id="utrInput" placeholder="Enter UTR Number" maxlength="20">
            <button class="utr-submit-btn" onclick="submitUTR()">Submit UTR</button>
        </div>
    </div>
    
    <!-- App Selection Modal -->
    <div class="app-modal" id="appModal">
        <div class="app-modal-content">
            <div class="app-modal-title">Select UPI App</div>
            <div class="app-grid">
                <div class="app-item" onclick="openUPIApp('googlepay')">
                    <svg class="app-icon-img" viewBox="0 0 48 48">
                        <rect fill="#fff" width="48" height="48" rx="10"/>
                        <path fill="#4285F4" d="M24 14v8h10.8c-.8 4.2-4.4 7.3-8.8 7.3-5.2 0-9.4-4.2-9.4-9.4s4.2-9.4 9.4-9.4c2.3 0 4.4.8 6 2.2l4.8-4.8C31.6 5.8 28 4 24 4 13.5 4 5 12.5 5 23s8.5 19 19 19 19-8.5 19-19c0-1.3-.1-2.6-.4-3.8H24z"/>
                        <path fill="#34A853" d="M5.6 16.4l5.6 4.1c1.5-4.4 5.7-7.5 10.6-7.5 2.3 0 4.4.8 6 2.2l4.8-4.8C29.5 7.3 26.9 6 24 6 15.9 6 9 11.8 5.6 16.4z"/>
                        <path fill="#FBBC05" d="M24 42c4.8 0 8.9-1.6 11.9-4.3l-5.5-4.5c-1.7 1.1-3.8 1.8-6.4 1.8-5 0-9.2-3.2-10.7-7.6l-5.6 4.3C9.1 37.4 15.9 42 24 42z"/>
                        <path fill="#EA4335" d="M42.6 23.5H24v8h10.8c-.5 2.5-1.8 4.6-3.8 6l5.5 4.5c3.2-3 5.1-7.4 5.1-12.7 0-1.9-.2-3.7-.6-5.4z"/>
                    </svg>
                    <div class="app-name">Google Pay</div>
                </div>
                
                <div class="app-item" onclick="openUPIApp('phonepe')">
                    <svg class="app-icon-img" viewBox="0 0 48 48">
                        <rect fill="#5f259f" width="48" height="48" rx="10"/>
                        <text x="24" y="32" text-anchor="middle" fill="white" font-size="20" font-weight="bold">P</text>
                    </svg>
                    <div class="app-name">PhonePe</div>
                </div>
                
                <div class="app-item" onclick="openUPIApp('paytm')">
                    <svg class="app-icon-img" viewBox="0 0 48 48">
                        <rect fill="#00baf2" width="48" height="48" rx="10"/>
                        <text x="24" y="32" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Pay</text>
                    </svg>
                    <div class="app-name">Paytm</div>
                </div>
                
                <div class="app-item" onclick="openUPIApp('bhim')">
                    <svg class="app-icon-img" viewBox="0 0 48 48">
                        <rect fill="#f47920" width="48" height="48" rx="10"/>
                        <text x="24" y="32" text-anchor="middle" fill="white" font-size="16" font-weight="bold">B</text>
                    </svg>
                    <div class="app-name">BHIM</div>
                </div>
            </div>
            <button class="close-modal" onclick="closeAppModal()">Cancel</button>
        </div>
    </div>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const encodedData = urlParams.get('data');
        
        let currentPaymentData = null;
        let countdownInterval = null;
        
        function showExpired() {
            document.getElementById('paymentContainer').innerHTML = `
                <div class="error-message">
                    <div class="expired-icon">⏰</div>
                    <h2>Link Expired</h2>
                    <p>This payment link has expired.<br>Payment links are valid for only 5 minutes.</p>
                </div>
            `;
        }
        
        function startCountdown(expirationTime) {
            function updateTimer() {
                const now = Date.now();
                const remaining = expirationTime - now;
                
                if (remaining <= 0) {
                    clearInterval(countdownInterval);
                    showExpired();
                    return;
                }
                
                const minutes = Math.floor(remaining / 60000);
                const seconds = Math.floor((remaining % 60000) / 1000);
                document.getElementById('timerValue').textContent = 
                    `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
            
            updateTimer();
            countdownInterval = setInterval(updateTimer, 1000);
        }
        
        if (encodedData) {
            try {
                const decodedData = atob(encodedData);
                currentPaymentData = JSON.parse(decodedData);
                
                const now = Date.now();
                const expirationTime = currentPaymentData.exp;
                
                if (!expirationTime || now > expirationTime) {
                    showExpired();
                } else {
                    const logoSection = document.getElementById('logoSection');
                    if (currentPaymentData.logo) {
                        logoSection.innerHTML = `
                            <img class="uploaded-logo" src="${currentPaymentData.logo}" alt="Logo">
                            <div class="logo-name">${currentPaymentData.logoName}</div>
                        `;
                    } else {
                        logoSection.innerHTML = `<div class="logo-name">${currentPaymentData.logoName}</div>`;
                    }
                    
                    document.getElementById('amountValue').textContent = '₹ ' + parseInt(currentPaymentData.amount).toLocaleString();
                    
                    if (currentPaymentData.description) {
                        document.getElementById('paymentDescription').textContent = currentPaymentData.description;
                    }
                    
                    if (currentPaymentData.upiId) {
                        document.getElementById('manualUpiId').textContent = currentPaymentData.upiId;
                    } else {
                        document.getElementById('upiSection').style.display = 'none';
                    }
                    
                    startCountdown(expirationTime);
                }
            } catch (e) {
                document.getElementById('paymentContainer').innerHTML = `
                    <div class="error-message">
                        <h2>⚠️ Invalid Link</h2>
                        <p>This payment link is corrupted or invalid.</p>
                    </div>
                `;
            }
        } else {
            document.getElementById('paymentContainer').innerHTML = `
                <div class="error-message">
                    <h2>⚠️ Invalid Link</h2>
                    <p>No payment information found.</p>
                </div>
            `;
        }
        
        function showAppSelector() {
            if (Date.now() > currentPaymentData.exp) {
                showExpired();
                return;
            }
            document.getElementById('appModal').classList.add('show');
        }
        
        function closeAppModal() {
            document.getElementById('appModal').classList.remove('show');
        }
        
        function openUPIApp(appName) {
            if (!currentPaymentData || !currentPaymentData.upiId) return;
            
            const amount = currentPaymentData.amount;
            const upiId = currentPaymentData.upiId;
            const name = currentPaymentData.logoName || 'Payment';
            
            // Create UPI payment link
            const upiLink = `upi://pay?pa=${encodeURIComponent(upiId)}&pn=${encodeURIComponent(name)}&am=${amount}&cu=INR`;
            
            // Open UPI app
            window.location.href = upiLink;
            
            // Close modal and show UTR form
            closeAppModal();
            
            setTimeout(() => {
                document.getElementById('utrSection').style.display = 'block';
                document.getElementById('utrSection').scrollIntoView({ behavior: 'smooth' });
            }, 500);
        }
        
        function copyUpiId() {
            if (!currentPaymentData || !currentPaymentData.upiId) return;
            
            if (Date.now() > currentPaymentData.exp) {
                showExpired();
                return;
            }
            
            navigator.clipboard.writeText(currentPaymentData.upiId).then(function() {
                alert('UPI ID copied: ' + currentPaymentData.upiId);
            }).catch(function() {
                const textArea = document.createElement('textarea');
                textArea.value = currentPaymentData.upiId;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                alert('UPI ID copied: ' + currentPaymentData.upiId);
            });
        }
        
        function submitUTR() {
            const utrNumber = document.getElementById('utrInput').value.trim();
            
            if (!utrNumber) {
                alert('Please enter the UTR number');
                return;
            }
            
            if (utrNumber.length < 8) {
                alert('UTR number should be at least 8 characters');
                return;
            }
            
            // Hide UTR section and show success
            document.getElementById('utrSection').innerHTML = `
                <div class="success-message">
                    <div class="success-icon">✅</div>
                    <h3>Payment Submitted!</h3>
                    <p>UTR: <strong>${utrNumber}</strong></p>
                    <p style="font-size: 12px; margin-top: 10px;">Your payment will be verified shortly.</p>
                </div>
            `;
            
            // Here you can add code to send UTR to your server
            console.log('UTR Submitted:', utrNumber);
            console.log('Payment Data:', currentPaymentData);
        }
    </script>
</body>
</html>
