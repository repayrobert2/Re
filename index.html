<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Gateway</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .presets {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .preset-btn {
            padding: 8px 16px;
            background: #f0f0f0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }
        .preset-btn:hover {
            background: #667eea;
            color: white;
        }
        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 25px;
        }
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .output-section {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 2px solid #f0f0f0;
        }
        .output-box {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 16px;
            font-family: monospace;
            font-size: 13px;
            word-break: break-all;
            margin: 10px 0;
        }
        .hidden { display: none !important; }
        
        /* Payment Page Styles */
        .payment-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            overflow: hidden;
        }
        .p-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .p-header h1 { font-size: 26px; margin-bottom: 8px; }
        .p-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
        }
        .p-info { padding: 25px 30px; border-bottom: 1px solid #eee; }
        .p-name { font-size: 20px; color: #333; font-weight: 600; margin-bottom: 5px; }
        .p-txn { font-size: 12px; color: #888; font-family: monospace; }
        .p-amount { padding: 30px; text-align: center; background: #f8f9fa; }
        .p-amount-label { font-size: 14px; color: #666; margin-bottom: 10px; }
        .p-amount-value { font-size: 48px; font-weight: bold; color: #333; }
        .p-amount-value span { font-size: 28px; color: #667eea; }
        .p-method { padding: 25px 30px; }
        .p-method-title { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 15px; }
        .p-upi-box {
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }
        .p-upi-box:hover { border-color: #667eea; background: #fafaff; }
        .p-upi-icon {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 11px;
        }
        .p-upi-info { flex: 1; }
        .p-upi-label { font-weight: 600; color: #333; font-size: 15px; }
        .p-upi-id { font-size: 13px; color: #666; font-family: monospace; margin-top: 3px; }
        .p-timer { padding: 20px 30px; text-align: center; background: #fff8e1; }
        .p-timer-text { font-size: 13px; color: #856404; }
        .p-timer-display { font-size: 26px; font-weight: bold; color: #e74c3c; margin-top: 5px; }
        .p-action { padding: 25px 30px; }
        .p-pay-btn {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 12px;
            font-size: 18px; font-weight: 600; cursor: pointer;
        }
        .p-footer { padding: 20px; text-align: center; border-top: 1px solid #eee; font-size: 12px; color: #999; }
        .p-processing {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.85);
            z-index: 1000; justify-content: center; align-items: center; flex-direction: column;
        }
        .p-spinner {
            width: 50px; height: 50px;
            border: 4px solid white; border-top-color: #667eea;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .p-processing-text { color: white; margin-top: 20px; font-size: 16px; }
    </style>
</head>
<body>
    <!-- GENERATOR VIEW -->
    <div id="generatorView" class="container">
        <div class="header">
            <h1>Payment Link Generator</h1>
            <p>Create custom payment links</p>
        </div>
        
        <div class="card">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>UPI ID</label>
                    <input type="text" id="upiInput" placeholder="example@upi">
                    <div class="presets">
                        <button class="preset-btn" onclick="setVal('upiInput','paytm.s12rb9h@pty')">Paytm</button>
                        <button class="preset-btn" onclick="setVal('upiInput','googlepay@okaxis')">GPay</button>
                        <button class="preset-btn" onclick="setVal('upiInput','phonepe@ybl')">PhonePe</button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Amount (₹)</label>
                    <input type="number" id="amountInput" placeholder="100" min="1">
                    <div class="presets">
                        <button class="preset-btn" onclick="setVal('amountInput','100')">₹100</button>
                        <button class="preset-btn" onclick="setVal('amountInput','500')">₹500</button>
                        <button class="preset-btn" onclick="setVal('amountInput','1000')">₹1K</button>
                        <button class="preset-btn" onclick="setVal('amountInput','3660')">₹3660</button>
                        <button class="preset-btn" onclick="setVal('amountInput','5000')">₹5K</button>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label>Merchant Name</label>
                <input type="text" id="nameInput" value="SecurePay">
            </div>
            
            <div class="actions">
                <button class="btn btn-primary" onclick="generate()">Generate Link</button>
                <button class="btn btn-secondary" onclick="openPayment()">Open Payment Page</button>
                <button class="btn btn-secondary" onclick="copyLink()">Copy Link</button>
                <button class="btn btn-secondary" onclick="clearForm()">Clear</button>
            </div>
            
            <div class="output-section" id="outputSection" style="display:none;">
                <label>Generated URL:</label>
                <div class="output-box" id="urlOutput"></div>
                <label>UPI Deep Link:</label>
                <div class="output-box" id="upiOutput"></div>
            </div>
        </div>
    </div>

    <!-- PAYMENT VIEW -->
    <div id="paymentView" class="hidden">
        <div class="payment-card">
            <div class="p-header">
                <h1>Secure Payment</h1>
                <div class="p-badge">256-bit SSL Encrypted</div>
            </div>
            <div class="p-info">
                <div class="p-name" id="pName">Loading...</div>
                <div class="p-txn">TXN: <span id="pTxn">---</span></div>
            </div>
            <div class="p-amount">
                <div class="p-amount-label">Total Amount</div>
                <div class="p-amount-value"><span>₹</span><span id="pAmount">0.00</span></div>
            </div>
            <div class="p-method">
                <div class="p-method-title">Pay via UPI</div>
                <div class="p-upi-box" onclick="doPay()">
                    <div class="p-upi-icon">UPI</div>
                    <div class="p-upi-info">
                        <div class="p-upi-label">Unified Payments Interface</div>
                        <div class="p-upi-id" id="pUpiId">---</div>
                    </div>
                </div>
            </div>
            <div class="p-timer">
                <div class="p-timer-text">Complete payment within</div>
                <div class="p-timer-display" id="pTimer">05:00</div>
            </div>
            <div class="p-action">
                <button class="p-pay-btn" onclick="doPay()">Pay Now ₹<span id="pBtnAmount">0.00</span></button>
            </div>
            <div class="p-footer">
                Secured by 256-bit encryption<br>Your transaction is protected
            </div>
        </div>
        <div class="p-processing" id="pProcessing">
            <div class="p-spinner"></div>
            <div class="p-processing-text">Processing your payment...</div>
        </div>
    </div>

    <script>
        // Check if URL has payment params
        const params = new URLSearchParams(window.location.search);
        const hasPaymentParams = params.has('upi') || params.has('amount');
        
        if (hasPaymentParams) {
            // Show payment view
            document.getElementById('generatorView').classList.add('hidden');
            document.getElementById('paymentView').classList.remove('hidden');
            
            // Fill payment data
            document.getElementById('pName').textContent = decodeURIComponent(params.get('name') || 'Merchant');
            document.getElementById('pAmount').textContent = parseFloat(params.get('amount') || '100').toFixed(2);
            document.getElementById('pBtnAmount').textContent = parseFloat(params.get('amount') || '100').toFixed(2);
            document.getElementById('pUpiId').textContent = params.get('upi') || 'test@upi';
            document.getElementById('pTxn').textContent = 'TXN' + Date.now().toString().slice(-10);
            
            // Start timer
            let timeLeft = 300;
            const timerUpdate = () => {
                const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
                const s = (timeLeft % 60).toString().padStart(2, '0');
                document.getElementById('pTimer').textContent = m + ':' + s;
                if (timeLeft > 0) { timeLeft--; setTimeout(timerUpdate, 1000); }
                else {
                    document.getElementById('pTimer').textContent = 'EXPIRED';
                    document.querySelector('.p-pay-btn').disabled = true;
                    document.querySelector('.p-pay-btn').textContent = 'Session Expired';
                }
            };
            timerUpdate();
        }
        
        function setVal(id, val) {
            document.getElementById(id).value = val;
        }
        
        function generate() {
            const upi = document.getElementById('upiInput').value.trim();
            const amount = document.getElementById('amountInput').value || '100';
            const name = encodeURIComponent(document.getElementById('nameInput').value || 'Merchant');
            
            if (!upi) { alert('Please enter UPI ID'); return; }
            
            const url = window.location.origin + window.location.pathname + '?name=' + name + '&amount=' + amount + '&upi=' + encodeURIComponent(upi);
            const upiLink = 'upi://pay?pa=' + encodeURIComponent(upi) + '&pn=' + name + '&am=' + amount + '&cu=INR';
            
            document.getElementById('urlOutput').textContent = url;
            document.getElementById('upiOutput').textContent = upiLink;
            document.getElementById('outputSection').style.display = 'block';
        }
        
        function openPayment() {
            const upi = document.getElementById('upiInput').value.trim();
            const amount = document.getElementById('amountInput').value || '100';
            const name = encodeURIComponent(document.getElementById('nameInput').value || 'Merchant');
            
            if (!upi) { alert('Please enter UPI ID'); return; }
            
            const url = window.location.origin + window.location.pathname + '?name=' + name + '&amount=' + amount + '&upi=' + encodeURIComponent(upi);
            window.open(url, '_blank');
        }
        
        function copyLink() {
            const url = document.getElementById('urlOutput').textContent;
            if (url) navigator.clipboard.writeText(url).then(() => alert('Copied!'));
        }
        
        function clearForm() {
            document.getElementById('upiInput').value = '';
            document.getElementById('amountInput').value = '';
            document.getElementById('nameInput').value = 'SecurePay';
            document.getElementById('outputSection').style.display = 'none';
        }
        
        function doPay() {
            const upi = params.get('upi') || 'test@upi';
            const amount = params.get('amount') || '100';
            const name = params.get('name') || 'Merchant';
            
            document.getElementById('pProcessing').style.display = 'flex';
            
            setTimeout(() => {
                document.getElementById('pProcessing').style.display = 'none';
                const upiUrl = 'upi://pay?pa=' + encodeURIComponent(upi) + '&pn=' + encodeURIComponent(name) + '&am=' + amount + '&cu=INR';
                window.location.href = upiUrl;
            }, 2000);
        }
        
        // Enter key
        document.addEventListener('keypress', e => { if (e.key === 'Enter') generate(); });
    </script>
</body>
</html>
