<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .secure-text {
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }
        
        .lock-icon {
            text-align: center;
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        .upload-section {
            margin-top: 30px;
        }
        
        .upload-label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
            font-weight: 500;
        }
        
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }
        
        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }
        
        .file-input-label {
            display: block;
            padding: 15px;
            background: #f8f9fa;
            border: 2px dashed #ddd;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            color: #666;
        }
        
        .file-input-label:hover {
            border-color: #667eea;
            background: #f0f2ff;
        }
        
        .logo-preview {
            width: 100%;
            height: 150px;
            border: 2px dashed #ddd;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 15px;
            overflow: hidden;
            background: #f8f9fa;
        }
        
        .logo-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .logo-preview-placeholder {
            color: #999;
            font-size: 14px;
        }
        
        .logo-name-section {
            margin-top: 25px;
        }
        
        .logo-name-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .logo-name-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 25px;
            transition: transform 0.2s;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
        }
        
        .logo-display {
            text-align: center;
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            display: none;
        }
        
        .logo-display.show {
            display: block;
        }
        
        .logo-display img {
            max-width: 100px;
            max-height: 100px;
            object-fit: contain;
        }
        
        .logo-display-name {
            margin-top: 10px;
            font-size: 18px;
            color: #333;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="lock-icon">🔒</div>
        <h1 class="secure-text">Secure payment</h1>
        
        <div class="upload-section">
            <label class="upload-label">Upload Logo</label>
            <div class="file-input-wrapper">
                <input type="file" id="logoInput" accept="image/*">
                <label for="logoInput" class="file-input-label">
                    📁 Click to upload logo
                </label>
            </div>
            
            <div class="logo-preview" id="logoPreview">
                <span class="logo-preview-placeholder">Logo preview will appear here</span>
            </div>
        </div>
        
        <div class="logo-name-section">
            <label class="upload-label">Logo Name</label>
            <input type="text" class="logo-name-input" id="logoNameInput" placeholder="Enter logo name">
        </div>
        
        <button class="submit-btn" onclick="submitLogo()">Submit</button>
        
        <div class="logo-display" id="logoDisplay">
            <img id="displayedLogo" src="" alt="Logo">
            <div class="logo-display-name" id="displayedName"></div>
        </div>
    </div>
    
    <script>
        const logoInput = document.getElementById('logoInput');
        const logoPreview = document.getElementById('logoPreview');
        const logoNameInput = document.getElementById('logoNameInput');
        const logoDisplay = document.getElementById('logoDisplay');
        const displayedLogo = document.getElementById('displayedLogo');
        const displayedName = document.getElementById('displayedName');
        
        let uploadedImage = null;
        
        logoInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    uploadedImage = e.target.result;
                    logoPreview.innerHTML = `<img src="${uploadedImage}" alt="Preview">`;
                };
                reader.readAsDataURL(file);
            }
        });
        
        function submitLogo() {
            const logoName = logoNameInput.value.trim();
            
            if (!uploadedImage) {
                alert('Please upload a logo first');
                return;
            }
            
            if (!logoName) {
                alert('Please enter a logo name');
                return;
            }
            
            displayedLogo.src = uploadedImage;
            displayedName.textContent = logoName;
            logoDisplay.classList.add('show');
            
            alert('Logo submitted successfully!');
        }
    </script>
</body>
</html>
